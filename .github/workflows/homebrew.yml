name: Homebrew

on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: Git tag to bump the Homebrew formula to
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump-formula:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag and version
        id: release
        run: |
          tag_name="${{ github.event.inputs.tag-name }}"
          version="${tag_name#v}"
          echo "tag-name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "download-url=https://files.pythonhosted.org/packages/source/k/koubou/koubou-$version.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI source distribution
        env:
          DOWNLOAD_URL: ${{ steps.release.outputs.download-url }}
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          url = os.environ["DOWNLOAD_URL"]
          attempts = 18
          delay_seconds = 10

          for attempt in range(1, attempts + 1):
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"PyPI artifact ready: {url}")
                          break
              except Exception as exc:
                  print(
                      f"Attempt {attempt}/{attempts} waiting for {url}: {exc}",
                      flush=True,
                  )
              time.sleep(delay_seconds)
          else:
              raise SystemExit(f"Timed out waiting for PyPI artifact: {url}")
          PY

      - name: Bump formula PR
        uses: mislav/bump-homebrew-formula-action@v3.6
        with:
          formula-name: koubou
          formula-path: Formula/koubou.rb
          tag-name: ${{ steps.release.outputs.tag-name }}
          download-url: ${{ steps.release.outputs.download-url }}
          homebrew-tap: bitomule/homebrew-tap
          push-to: bitomule/homebrew-tap
          base-branch: master
          create-branch: true
          create-pullrequest: true
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
