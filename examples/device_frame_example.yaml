# 🎯 Device Frame Example
# This configuration demonstrates device frame usage with the new v0.10.0+ config structure
# NOTE: For multiple devices, create separate YAML files (e.g., iphone-frame.yaml, ipad-frame.yaml)

project:
  name: "Device Frame Example"
  output_dir: "output"
  device: "iPhone 15 Pro - Natural Titanium - Portrait"
  output_size: "iPhone6_7"  # 1290×2796 - iPhone 15 Pro Max App Store size

defaults:
  background:
    type: "radial"
    colors: ["#ff9a9e", "#fecfef"]
    center: ["50%", "30%"]

screenshots:
  app_screen:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "50%"]
        scale: 0.6
        frame: true  # Enable device frame rendering

      - type: "text"
        content: "Now Available"
        position: ["50%", "15%"]
        size: 36
        color: "#333333"
        alignment: "center"

  feature_highlight:
    background:
      type: "linear"
      colors: ["#667eea", "#764ba2"]
      direction: 135
    content:
      - type: "image"
        asset: "screenshots/feature_screen.png"
        position: ["50%", "55%"]
        scale: 0.5
        frame: true

      - type: "text"
        content: "Amazing Features"
        position: ["50%", "12%"]
        size: 42
        weight: "bold"
        color: "#ffffff"
        alignment: "center"
