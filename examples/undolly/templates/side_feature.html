<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: linear-gradient(145deg, #0f0f1a 0%, #1a1035 50%, #0d0820 100%);
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 0;
    width: 50%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(249,115,22,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .text-area {
    position: absolute;
    top: 8%;
    left: 6%;
    right: 6%;
    z-index: 2;
    text-align: center;
  }
  h1 {
    font-size: 11vw;
    font-weight: 800;
    color: white;
    line-height: 1.06;
    letter-spacing: -0.02em;
  }
  h1 span {
    background: linear-gradient(135deg, #fbbf24, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 4.8vw;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.3;
    margin-top: 2.5vh;
  }
  .device-area {
    position: absolute;
    bottom: -8%;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    z-index: 1;
  }
  .device-area img {
    width: 100%;
    height: auto;
    object-fit: contain;
    transform: rotate(-6deg);
    transform-origin: center center;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
  <div class="text-area">
    <h1>{{headline_prefix}} <span>{{headline_accent}}</span> {{headline_suffix}}<br>{{headline_tail}}</h1>
    <p>{{subtitle}}</p>
  </div>
  <div class="device-area">
    <img src="{{app_screenshot}}">
  </div>
</body>
</html>
