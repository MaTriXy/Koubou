<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: linear-gradient(160deg, #1a0a2e 0%, #0f0f1a 60%, #1a1035 100%);
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 15%;
    right: -10%;
    width: 60%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(251,191,36,0.1) 0%, transparent 65%);
    pointer-events: none;
  }
  .text-area {
    position: absolute;
    top: 10%;
    left: 6%;
    width: 48%;
    z-index: 2;
  }
  h1 {
    font-size: 13vw;
    font-weight: 800;
    color: white;
    line-height: 1.04;
    letter-spacing: -0.03em;
    text-align: left;
  }
  h1 span {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 5vw;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.3;
    margin-top: 3vh;
    text-align: left;
  }
  .device-area {
    position: absolute;
    top: 20%;
    right: -14%;
    width: 78%;
    z-index: 1;
  }
  .device-area img {
    width: 100%;
    height: auto;
    object-fit: contain;
    transform: rotate(6deg);
    transform-origin: center center;
    filter: drop-shadow(-30px 30px 60px rgba(0,0,0,0.55));
  }
</style>
</head>
<body>
  <div class="text-area">
    <h1>{{headline_line_1}}<br><span>{{headline_accent}}</span><br>{{headline_line_3}}</h1>
    <p>{{subtitle_line_1}}<br>{{subtitle_line_2}}</p>
  </div>
  <div class="device-area">
    <img src="{{app_screenshot}}">
  </div>
</body>
</html>
